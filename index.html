<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mijn Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      background: #555;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>

<header>
  <h1>Welkom op mijn website</h1>
  <p>Dit is mijn eerste site 🚀</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Over mij</a>
  <a href="#">Contact</a>
</nav>

<div class="container">
  <div class="card">
    <h2>Home</h2>
    <p>Welkom! Dit is de startpagina van mijn website.</p>
  </div>

  <div class="card">
    <h2>Over mij</h2>
    <p>Ik ben een beginner met websites en leer HTML, CSS en JavaScript.</p>
  </div>

  <div class="card">
    <h2>Contact</h2>
    <p>Email: jouwemail@example.com</p>
  </div>
</div>

<footer>
  <p>© 2026 Mijn Website</p>
</footer>

<script>
  console.log("Website geladen!");
</script>

</body>
</html>
